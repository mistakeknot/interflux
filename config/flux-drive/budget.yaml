# Token budget configuration for flux-drive agent dispatch
# Budgets are in billing tokens (input_tokens + output_tokens) across ALL agents in a run.
# Override per-project via {PROJECT_ROOT}/.claude/flux-drive-budget.yaml

# Default budgets by input type
budgets:
  plan: 150000
  brainstorm: 80000
  prd: 120000
  spec: 150000
  diff-small: 60000      # diff < 500 lines
  diff-large: 200000     # diff >= 500 lines
  repo: 300000
  other: 150000

# Per-agent token estimates (cold-start fallback)
# Used when interstat has < 3 runs for an agent+model pair
agent_defaults:
  review: 40000           # fd-architecture, fd-safety, fd-correctness, fd-quality, fd-user-product, fd-performance, fd-game-design
  cognitive: 35000         # fd-systems, fd-decisions, fd-people, fd-resilience, fd-perception
  research: 15000          # best-practices-researcher, framework-docs-researcher, etc.
  oracle: 80000            # cross-AI Oracle review
  generated: 40000         # flux-gen project-specific agents
  reaction: 15000          # per-agent reaction round cost (sonnet, focused prompt)

# Slicing discount: multiply estimate by this factor when document slicing is active
slicing_multiplier: 0.5

# Minimum agents to always dispatch (regardless of budget)
min_agents: 2

# Budget enforcement
enforcement: soft          # soft = warn + offer override | hard = block
cost_basis: billing        # billing = input+output (cache reads free) | total = all tokens incl. cache

# Reaction round budget cap (Phase 2.5)
# Reaction tokens are charged against the same BUDGET_TOTAL as dispatch.
# fraction: max fraction of BUDGET_TOTAL that reaction round may consume
# If estimated reaction cost would exceed this, drop lowest-score agents from reaction pool.
reaction_budget:
  fraction: 0.25           # reaction round can use up to 25% of total budget
  min_agents: 2            # always react with at least 2 agents (even if over budget)

# Safety-critical agents — never dropped by budget cuts or AgentDropout (T8.1 mitigation)
# These agents always run regardless of budget constraints or redundancy signals
exempt_agents:
  - fd-safety
  - fd-correctness

# AgentDropout — dynamic redundancy elimination (Step 2.2a.5)
# Prunes Stage 2/expansion pool agents whose domains are already well-covered by Stage 1
dropout:
  enabled: true
  threshold: 0.6            # redundancy score (0.0-1.0) at which an agent is dropped
                            # Lower = more aggressive pruning, higher = more conservative
                            # 0.6 requires domain convergence (0.4) + finding density (0.2)
                            # Lowered from 0.7 (Demarch-1x9l.3) — saves 15-40K tokens per dropped agent
                            # Validated 2026-03-26 (26+ runs): 0% P0/P1 recall loss — dropout candidates never produce P0/P1

# Incremental expansion — speculative Stage 2 launch (Step 2.2a.6)
# Launches Stage 2 candidates early when Stage 1 findings justify it (expansion_score >= 3)
incremental_expansion:
  enabled: true
  max_speculative: 2          # max agents launched speculatively during Stage 1

# Cross-model dispatch — evidence-proportional tier routing for expansion pool
# Adjusts Stage 2 / speculative agent model tiers based on expansion score,
# domain complexity, and budget pressure. Safety floors always enforced.
cross_model_dispatch:
  enabled: true
  mode: shadow    # shadow = log adjustments without applying | enforce = apply adjustments
