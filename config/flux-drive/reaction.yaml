reaction_round:
  enabled: true
  model: sonnet
  severity_filter: ["P0", "P1"]
  severity_filter_p2_light: true  # show P2 for single-sentence severity check
  max_reactions_per_agent: 3
  skip_if_convergence_above: 0.6
  timeout_seconds: 60
  # Disabled by default for quality-gates mode (speed > depth)
  mode_overrides:
    quality-gates: false
    review: true
    flux-drive: true

sycophancy_detection:
  enabled: true
  agreement_threshold: 0.8    # flag if agreement_rate > this
  independence_threshold: 0.3  # AND independent_rate < this
  contrarian_threshold: 0.2    # flag if agreement_rate < this

# Hearsay rule (rsj.12): discount confirmations that cite peer outputs without independent evidence
hearsay_detection:
  enabled: true
  # A confirming reaction is hearsay if it has NO new file:line evidence
  # beyond what the original finding already provided.
  # Hearsay reactions count as 0.0 in convergence scoring (vs 1.0 for independent confirmations).
  convergence_weight_hearsay: 0.0       # weight for hearsay confirmations
  convergence_weight_independent: 1.0   # weight for independent confirmations
  convergence_weight_reactive: 0.5      # weight for reactive additions (unchanged)

# Discourse protocols (rsj.7)
discourse:
  sawyer: discourse-sawyer.yaml     # health monitoring (computed in synthesis)
  lorenzen: discourse-lorenzen.yaml  # move validation (passed to synthesis as LORENZEN_CONFIG)
  fixative: discourse-fixative.yaml  # corrective prompt injection (pre-reaction)
  # Future: yes-and, conduction, pressing (Phase 2/3)
