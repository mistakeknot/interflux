# Sparse Communication Topology — domain-aware peer visibility (rsj.11)
# Controls which agents see which peer findings in the reaction round.
# Does NOT affect convergence gate, fixative health metrics, or synthesis —
# those always operate on the full, unfiltered agent population.

topology:
  enabled: true
  mode: domain-aware

  # Visibility levels:
  #   full:    complete Findings Index block (multi-line, with sub-descriptions)
  #   summary: index lines only (- SEVERITY | ID | Title)
  #   none:    no visibility from this peer group
  domain_proximity:
    same_role: full
    adjacent_role: summary
    distant_role: none

  # Role adjacency derived from agent-roles.yaml.
  # Linear chain: planner ↔ reviewer ↔ editor ↔ checker
  # Plus cross-cluster links for epistemic proximity (SCT-03/ARCH-04 fix):
  # planner ↔ checker get summary visibility (not none).
  adjacency:
    planner: [reviewer, checker]    # checker added: fd-systems ↔ fd-resilience cross-examination
    reviewer: [planner, editor]
    editor: [reviewer, checker]
    checker: [editor, planner]      # planner added: complementary systems-level thinking

  # Default role for agents not in agent-roles.yaml
  # (e.g., project-specific fd-* agents generated by flux-gen)
  default_role: editor

  # Minimum-visibility fallback (SCT-02 fix):
  # When an agent has zero visible peers after topology filtering,
  # fall back to summary-only visibility from ALL peers.
  # Prevents silent no-op when only non-adjacent agents are dispatched.
  fallback_on_isolation: summary
