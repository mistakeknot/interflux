# Agent Role Mappings for Heterogeneous Routing (iv-jc4j)
#
# Inspired by Dr. MAS (Dynamic Role Multi-Agent Systems): assigns model tier
# per agent based on role capability requirements, not uniform per-phase defaults.
#
# Roles (from SC-MAS/Dr. MAS taxonomy):
#   planner   — High-capability model needed (architectural decisions, systems thinking)
#   reviewer  — Medium-high capability (detailed checking, correctness, safety)
#   editor    — Medium capability (practical suggestions, UX, performance)
#   checker   — Lower capability sufficient (pattern matching, format checking)
#
# model_tier: declared preference for experiment scoring and cost analysis.
# min_model: ENFORCED safety floor — lib-routing.sh clamps resolved model
# to at least this tier. Added iv-db5pc (2026-03-01).
#
# domain_complexity: low|medium|high — minimum reasoning tier for coherent analysis
#   in this domain. Used by cross-model dispatch to prevent downgrading complex-domain
#   agents below their reasoning floor. low=pattern matching, medium=practical analysis,
#   high=architectural/correctness reasoning.
#
# max_model: haiku|sonnet|opus (optional) — maximum tier warranted for this role.
#   Prevents over-resourcing simple-domain agents during upgrade passes.
#   If absent, no ceiling is enforced.
#
# Safety rule (from iv-dthn Loop 4): fd-safety and fd-correctness NEVER
# route below Sonnet regardless of role assignment.

roles:
  planner:
    description: Architectural decisions requiring high reasoning capability
    model_tier: opus
    min_model: sonnet   # safety floor — never downgrade below this
    domain_complexity: high
    agents:
      - fd-architecture
      - fd-systems

  reviewer:
    description: Detailed checking requiring medium-high capability
    model_tier: sonnet
    min_model: sonnet  # safety floor — never downgrade below this
    domain_complexity: high
    agents:
      - fd-correctness
      - fd-quality
      - fd-safety

  editor:
    description: Practical suggestions and domain-specific analysis
    model_tier: sonnet
    domain_complexity: medium
    agents:
      - fd-performance
      - fd-user-product
      - fd-game-design

  checker:
    description: Pattern matching and cognitive lens application
    model_tier: haiku
    domain_complexity: low
    max_model: sonnet   # checkers shouldn't get opus even on upgrade
    agents:
      - fd-perception
      - fd-resilience
      - fd-decisions
      - fd-people

  challenger:
    description: Unqualified model under evaluation via FluxBench challenger slot
    model_tier: sonnet
    domain_complexity: medium
    max_model: sonnet   # challengers capped at sonnet until promoted
    agents: []          # populated dynamically by fluxbench-challenger.sh

  # ============================================================================
  # Built-in subagent types and high-volume non-fd agents
  # Added 2026-05-09 per Sylveste-cs2 (heuristic coverage extension).
  # Defaults sourced from observed production usage in interstat metrics.db
  # — see docs/brainstorms/2026-05-06-microrouter-heuristic-baseline.md.
  # NOTE: lib-routing.sh consumes min_model + max_model; model_tier is
  # documentation only (the parser does not read it). Defaults expressed
  # via min_model/max_model floors and ceilings.
  # ============================================================================

  builtin-explorer:
    description: Read-only codebase exploration; haiku-default with opus ceiling for deep searches
    model_tier: haiku       # observed: haiku=88 (65%), opus=32, sonnet=15
    domain_complexity: low
    max_model: opus         # allow up-to-opus when caller explicitly requests
    agents:
      - Explore

  builtin-planner:
    description: Architecture/strategy planning; opus-default with sonnet floor
    model_tier: opus        # observed: opus=6 (75%), haiku=2
    min_model: sonnet       # never below sonnet — planning needs reasoning
    domain_complexity: high
    agents:
      - Plan

  builtin-general:
    description: General-purpose subagent for unscoped exploration; opus-default with no floor
    model_tier: opus        # observed: opus=102 (56%), sonnet=51, haiku=28
    domain_complexity: medium
    agents:
      - general-purpose

  interflux-researcher:
    description: External research subagents (best-practices, framework-docs, git-history, learnings, repo-research)
    model_tier: opus        # observed: best-practices-researcher dominantly opus
    min_model: sonnet       # research synthesis needs reasoning depth
    domain_complexity: medium
    agents:
      - best-practices-researcher
      - framework-docs-researcher
      - git-history-analyzer
      - learnings-researcher
      - repo-research-analyst

  plugin-reviewer:
    description: Cross-plugin reviewer subagents (plan-reviewer, synthesize-review, code-reviewer)
    model_tier: opus        # observed: clavain:plan-reviewer + intersynth:synthesize-review
    min_model: sonnet       # reviewer-class — never below sonnet
    domain_complexity: high
    agents:
      - plan-reviewer
      - synthesize-review
      - code-reviewer

  generated-fd-reviewer:
    description: |
      Auto-generated fd-* reviewer agents created by interflux flux-drive.
      Reviewer-class by convention. Enumerated set is what's been observed in
      historical workload (interstat metrics.db); future generated agents will
      need explicit additions here OR a parser extension to support pattern-based
      defaults (e.g., glob 'fd-*' → reviewer role). The latter is the right v1
      but lib-routing.sh's YAML parser doesn't currently support patterns.
    model_tier: sonnet      # reviewer-equivalent default
    min_model: sonnet       # never downgrade reviewers below sonnet
    max_model: opus
    domain_complexity: high
    agents:
      - fd-tick-pipeline-integration
      - fd-ecs-mutation-safety
      - fd-wgpu-metal-interop
      - fd-unsafe-ffi-correctness
      - fd-resource-capacity-contracts
      - fd-lifecycle-state-machine
      - fd-integration-contract
      - fd-computational-tractability
      - fd-bevy-rendergraph-lifecycle

# Experiment tracking — which experiments have been run and their status.
# Updated by experiment execution scripts, read by framework_score.py.
experiments:
  exp1_complexity_routing:
    status: complete   # Analyzed via interstat — B2 not needed, B1 + floors optimal
    baseline_runs: 34  # Analyzed from existing interstat data
    shadow_runs: 0     # Shadow mode active but dedicated runs not needed
    finding: "Hypothesis inverted — role-aware routing increases cost 20%"
  exp2_role_aware:
    status: complete   # Analyzed via interstat per-agent tier distribution
    baseline_runs: 34
    shadow_runs: 0
    finding: "fd-safety on Haiku 47%, fd-correctness 26% — quality risk, not cost opportunity"
  exp3_collaboration_modes:
    status: deferred   # Requires flux-drive dispatch changes
    runs_per_mode: 0
  exp4_pareto_frontier:
    status: partial    # Real data shows B1+floors dominates
    policies_tested: 2 # B1 (actual) and B2-projected (via interstat analysis)
    finding: "B1 + safety floors is Pareto-optimal for current workload"
